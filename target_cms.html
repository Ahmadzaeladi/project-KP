<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA CMS Dashboard | PT Pra Kerja Nusantara</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom SPA CSS -->
    <link rel="stylesheet" href="spa-admin.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar SPA (Desktop) -->
        <aside class="sidebar-spa">
            <div class="sidebar-brand">
                PKN<span>.</span>SPA
            </div>
            <nav class="nav-links-spa">
                <a href="#dashboard" class="nav-link-spa" data-view="dashboard">
                    <i class="fas fa-grid-2"></i> Dashboard
                </a>
                <a href="#hero" class="nav-link-spa" data-view="hero">
                    <i class="fas fa-palette"></i> Hero Style
                </a>
                <a href="#team" class="nav-link-spa" data-view="team">
                    <i class="fas fa-user-group"></i> Team Collective
                </a>
                <a href="#gallery" class="nav-link-spa" data-view="gallery">
                    <i class="fas fa-images"></i> Visual Archive
                </a>
            </nav>
            <div style="padding: 2rem;">
                <a href="index.html" class="nav-link-spa" style="background: #f1f5f9;">
                    <i class="fas fa-arrow-up-right-from-square"></i> Live Site
                </a>
            </div>
        </aside>

        <!-- Bottom Nav SPA (Mobile) -->
        <nav class="bottom-nav-spa">
            <a href="#dashboard" class="bottom-link" data-view="dashboard"><i class="fas fa-house"></i></a>
            <a href="#hero" class="bottom-link" data-view="hero"><i class="fas fa-wand-magic-sparkles"></i></a>
            <a href="#team" class="bottom-link" data-view="team"><i class="fas fa-users-gear"></i></a>
            <a href="#gallery" class="bottom-link" data-view="gallery"><i class="fas fa-photo-film"></i></a>
        </nav>

        <!-- Modal Popup (Bottom Sheet) -->
        <div class="modal-overlay-spa" id="photo-modal">
            <div class="modal-content-spa">
                <div class="drag-handle-mobile"></div>
                <div class="modal-header-spa">
                    <h2 style="font-weight: 800; margin: 0;">Tambah Arsip</h2>
                    <button onclick="closeModal()" style="background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;"><i class="fas fa-times"></i></button>
                </div>
                
                <form id="add-photo-form" style="display: grid; gap: 20px;">
                    <div>
                        <label class="form-label-spa">Judul Kegiatan</label>
                        <input type="text" class="input-spa" placeholder="Contoh: Pelatihan Softskill 2024">
                    </div>
                    <div>
                        <label class="form-label-spa">Tanggal Pelaksanaan</label>
                        <input type="date" class="input-spa">
                    </div>
                    <div>
                        <label class="form-label-spa">Dokumentasi Foto</label>
                        <div class="file-upload-zone">
                            <i class="fas fa-cloud-arrow-up fs-1 text-muted mb-3"></i>
                            <h5 style="margin-bottom: 0.5rem; font-weight: 700;">Pilih atau Drop Foto</h5>
                            <p class="small text-muted mb-0">Format JPG, PNG (Max 5MB)</p>
                        </div>
                    </div>
                    <div style="margin-top: 1rem;">
                        <button type="submit" class="btn-spa btn-spa-primary" style="width: 100%;">Upload & Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="main-view" id="app-view">
            <!-- Content will be injected here by JS -->
            <div class="view-content">
                <h2>Memuat Dashboard...</h2>
            </div>
        </main>
    </div>

    <!-- SPA Logic -->
    <script>
        const views = {
            dashboard: `
                <div class="view-content">
                    <header style="margin-bottom: 3rem;">
                        <h1 style="font-weight: 800; font-size: 2rem; margin-bottom: 0.5rem;">Kolektif Overview</h1>
                        <p style="color: var(--text-muted);">Pantau performa narasi digital Anda hari ini.</p>
                    </header>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 3rem;">
                        <div class="card-spa stat-card">
                            <div class="icon-box-spa" style="background: rgba(0, 74, 173, 0.1); color: var(--primary-color);">
                                <i class="fas fa-fingerprint"></i>
                            </div>
                            <div>
                                <h3 style="margin: 0; font-size: 1.5rem; font-weight: 800;">2.4k</h3>
                                <p style="margin: 0; color: var(--text-muted); font-size: 0.85rem;">Unique Visitors</p>
                            </div>
                        </div>
                        <div class="card-spa stat-card">
                            <div class="icon-box-spa" style="background: rgba(0, 180, 216, 0.1); color: var(--secondary-color);">
                                <i class="fas fa-paper-plane"></i>
                            </div>
                            <div>
                                <h3 style="margin: 0; font-size: 1.5rem; font-weight: 800;">48</h3>
                                <p style="margin: 0; color: var(--text-muted); font-size: 0.85rem;">New Inquiries</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-spa">
                        <h4 style="margin-bottom: 2rem; font-weight: 700;">Aktivitas Terakhir</h4>
                        <div style="display: flex; flex-direction: column; gap: 20px;">
                            <div style="display: flex; align-items: center; gap: 15px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9;">
                                <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--secondary-color);"></div>
                                <p style="margin: 0; font-size: 0.9rem;">Update Hero Headline oleh Admin</p>
                                <span style="margin-left: auto; color: var(--text-muted); font-size: 0.8rem;">2 jam lalu</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div style="width: 10px; height: 10px; border-radius: 50%; background: #10b981;"></div>
                                <p style="margin: 0; font-size: 0.9rem;">Anggota tim baru ditambahkan</p>
                                <span style="margin-left: auto; color: var(--text-muted); font-size: 0.8rem;">5 jam lalu</span>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            hero: `
                <div class="view-content">
                    <header style="margin-bottom: 3rem;">
                        <h1 style="font-weight: 800; font-size: 2rem; margin-bottom: 0.5rem;">Arsitektur Hero</h1>
                        <p style="color: var(--text-muted);">Kelola impresi pertama pengunjung website Anda.</p>
                    </header>
                    
                    <div class="card-spa">
                        <form style="display: grid; gap: 25px;">
                            <div>
                                <label class="form-label-spa">Judul Utama (Headline)</label>
                                <input type="text" class="input-spa" value="Evolusi Outsourcing yang Melampaui Batas.">
                            </div>
                            <div>
                                <label class="form-label-spa">Narasi Singkat</label>
                                <textarea class="input-spa" rows="4">Bukan sekadar penyedia tenaga kerja. Kami adalah partner strategis yang menghubungkan potensi manusia dengan ambisi korporasi.</textarea>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div>
                                    <label class="form-label-spa">Primary CTA</label>
                                    <input type="text" class="input-spa" value="Eksplorasi">
                                </div>
                                <div>
                                    <label class="form-label-spa">Secondary CTA</label>
                                    <input type="text" class="input-spa" value="Kolaborasi">
                                </div>
                            </div>
                            <div style="margin-top: 1rem;">
                                <button type="button" class="btn-spa btn-spa-primary">Perbarui Narasi Hero</button>
                            </div>
                        </form>
                    </div>
                </div>
            `,
            team: `
                <div class="view-content">
                    <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end;">
                        <div>
                            <h1 style="font-weight: 800; font-size: 2rem; margin-bottom: 0.5rem;">Kolektif Tim</h1>
                            <p style="color: var(--text-muted);">Kelola profil profesional di balik PKN.</p>
                        </div>
                        <button class="btn-spa btn-spa-primary" style="padding: 0.8rem 1.5rem;"><i class="fas fa-plus me-2"></i> Tambah</button>
                    </header>

                    <div style="display: grid; gap: 20px;">
                        <div class="card-spa" style="padding: 1.2rem; display: flex; align-items: center; gap: 20px;">
                            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a" style="width: 60px; height: 60px; border-radius: 15px; object-fit: cover;">
                            <div>
                                <h5 style="margin: 0; font-weight: 700;">Budi Santoso</h5>
                                <p style="margin: 0; font-size: 0.8rem; color: var(--primary-color); font-weight: 600;">Direktur Utama</p>
                            </div>
                            <div style="margin-left: auto; display: flex; gap: 10px;">
                                <button style="background: #f1f5f9; border: none; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-pen text-muted"></i></button>
                                <button style="background: #fee2e2; border: none; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-trash text-danger"></i></button>
                            </div>
                        </div>
                        <div class="card-spa" style="padding: 1.2rem; display: flex; align-items: center; gap: 20px;">
                            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2" style="width: 60px; height: height: 60px; border-radius: 15px; object-fit: cover;">
                            <div>
                                <h5 style="margin: 0; font-weight: 700;">Sari Wijaya</h5>
                                <p style="margin: 0; font-size: 0.8rem; color: var(--primary-color); font-weight: 600;">Manajer HRD</p>
                            </div>
                            <div style="margin-left: auto; display: flex; gap: 10px;">
                                <button style="background: #f1f5f9; border: none; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-pen text-muted"></i></button>
                                <button style="background: #fee2e2; border: none; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-trash text-danger"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            gallery: `
                <div class="view-content">
                    <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end;">
                        <div>
                            <h1 style="font-weight: 800; font-size: 2rem; margin-bottom: 0.5rem;">Arsip Visual</h1>
                            <p style="color: var(--text-muted);">Kelola dokumentasi kegiatan kolektif Anda.</p>
                        </div>
                        <button class="btn-spa btn-spa-primary" style="padding: 0.8rem 1.5rem;" onclick="openModal()"><i class="fas fa-plus me-2"></i> Tambah Foto</button>
                    </header>
                    
                    <div class="cms-table-container">
                        <table class="cms-table">
                            <thead>
                                <tr>
                                    <th style="width: 100px;">Urutan</th>
                                    <th>Preview</th>
                                    <th>Judul Kegiatan</th>
                                    <th>Tanggal</th>
                                    <th>Status</th>
                                    <th class="text-end">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Row 1 -->
                                <tr id="gal-1">
                                    <td data-label="Urutan">
                                        <div class="order-control">
                                            <input type="number" class="order-input" value="1" min="1" onfocus="this.dataset.prev = this.value" onchange="validateOrders(this)">
                                            <div class="order-actions">
                                                <button title="Pindah ke Atas" onclick="moveOrder(this, 'up')"><i class="fas fa-caret-up"></i></button>
                                                <button title="Pindah ke Bawah" onclick="moveOrder(this, 'down')"><i class="fas fa-caret-down"></i></button>
                                            </div>
                                        </div>
                                    </td>
                                    <td data-label="Preview"><img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0" class="thumbnail-cms"></td>
                                    <td data-label="Judul">
                                        <div class="fw-bold">Sinkronisasi Tim Bulanan</div>
                                        <small class="text-muted">Workshop Internal</small>
                                    </td>
                                    <td data-label="Tanggal" class="fw-semibold">12 April 2024</td>
                                    <td data-label="Status">
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="toggle-switch-spa active" onclick="toggleTableStatus('gal-1')">
                                                <div class="toggle-dot"></div>
                                            </div>
                                            <span class="status-text fw-bold text-success" style="font-size: 11px;">AKTIF</span>
                                        </div>
                                    </td>
                                    <td data-label="Aksi" class="text-end">
                                        <button style="background: #fee2e2; border: none; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-trash text-danger"></i></button>
                                    </td>
                                </tr>
                                <!-- Row 2 -->
                                <tr id="gal-2" class="inactive-row">
                                    <td data-label="Urutan">
                                        <div class="order-control">
                                            <input type="number" class="order-input" value="" min="1" onfocus="this.dataset.prev = this.value" onchange="validateOrders(this)" disabled>
                                            <div class="order-actions">
                                                <button title="Pindah ke Atas" onclick="moveOrder(this, 'up')" disabled><i class="fas fa-caret-up"></i></button>
                                                <button title="Pindah ke Bawah" onclick="moveOrder(this, 'down')" disabled><i class="fas fa-caret-down"></i></button>
                                            </div>
                                        </div>
                                    </td>
                                    <td data-label="Preview"><img src="https://images.unsplash.com/photo-1552664730-d307ca884978" class="thumbnail-cms"></td>
                                    <td data-label="Judul">
                                        <div class="fw-bold">Pelatihan Soft Skill</div>
                                        <small class="text-muted">Training Center</small>
                                    </td>
                                    <td data-label="Tanggal" class="fw-semibold">05 April 2024</td>
                                    <td data-label="Status">
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="toggle-switch-spa" onclick="toggleTableStatus('gal-2')">
                                                <div class="toggle-dot"></div>
                                            </div>
                                            <span class="status-text fw-bold text-danger" style="font-size: 11px;">NON-AKTIF</span>
                                        </div>
                                    </td>
                                    <td data-label="Aksi" class="text-end">
                                        <button style="background: #fee2e2; border: none; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-trash text-danger"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `
        };

        function toggleTableStatus(id) {
            const row = document.getElementById(id);
            const toggle = row.querySelector('.toggle-switch-spa');
            const statusText = row.querySelector('.status-text');
            const orderInput = row.querySelector('.order-input');
            const orderBtns = row.querySelectorAll('.order-actions button');
            
            if (row.classList.contains('inactive-row')) {
                // Aktifkan
                row.classList.remove('inactive-row');
                toggle.classList.add('active');
                statusText.className = 'status-text fw-bold text-success';
                statusText.textContent = 'AKTIF';
                
                // Enable order control & beri nomor otomatis
                orderInput.disabled = false;
                orderBtns.forEach(btn => btn.disabled = false);
                if (orderInput.value === "" || orderInput.value === "0") {
                    orderInput.value = getNextOrderNumber();
                    orderInput.dataset.prev = orderInput.value;
                }
                showToast('Foto diaktifkan dan masuk ke urutan tayang', 'success');
            } else {
                // Non-aktifkan
                row.classList.add('inactive-row');
                toggle.classList.remove('active');
                statusText.className = 'status-text fw-bold text-danger';
                statusText.textContent = 'NON-AKTIF';
                
                // Disable order control & kosongkan (opsional agar rapi)
                orderInput.dataset.prev = orderInput.value;
                orderInput.value = ""; 
                orderInput.disabled = true;
                orderBtns.forEach(btn => btn.disabled = true);
                showToast('Foto dinonaktifkan dari daftar tayang', 'info');
            }
        }

        function getNextOrderNumber() {
            const inputs = document.querySelectorAll('.order-input');
            let max = 0;
            inputs.forEach(input => {
                const val = parseInt(input.value) || 0;
                if (val > max) max = val;
            });
            return max + 1;
        }

        // Order Logic
        function moveOrder(btn, direction) {
            const row = btn.closest('tr');
            const input = row.querySelector('.order-input');
            let val = parseInt(input.value);
            
            // Simpan nilai lama sebelum diubah
            input.dataset.prev = input.value;
            
            if (direction === 'up' && val > 1) {
                input.value = val - 1;
            } else if (direction === 'down') {
                input.value = val + 1;
            }
            
            validateOrders(input);

            // Simulation visual feedback
            row.style.background = 'rgba(0, 180, 216, 0.05)';
            setTimeout(() => {
                row.style.background = '';
            }, 500);
        }

        function validateOrders(currentInput) {
            const allInputs = document.querySelectorAll('.order-input');
            const currentVal = currentInput.value;
            let isDuplicate = false;

            allInputs.forEach(input => {
                // Jika ada input lain yang memiliki nilai yang sama
                if (input !== currentInput && input.value === currentVal && currentVal !== "") {
                    isDuplicate = true;
                }
            });

            if (isDuplicate) {
                 // Berikan peringatan visual error sesaat
                 const control = currentInput.closest('.order-control');
                 control.classList.add('error');
                 
                 showToast(`Nomor urutan ${currentVal} sudah digunakan!`, 'error');
                 
                 // Kembalikan ke nilai sebelumnya (Rollback)
                 setTimeout(() => {
                     currentInput.value = currentInput.dataset.prev || "";
                     control.classList.remove('error');
                 }, 500);
             } else {
                 // Update nilai prev jika valid
                 currentInput.dataset.prev = currentVal;
             }
         }

         function showToast(message, type = 'info') {
             // Remove existing toast if any
             const existingToast = document.querySelector('.toast-spa');
             if (existingToast) existingToast.remove();

             const toast = document.createElement('div');
             toast.className = `toast-spa ${type}`;
             
             let icon = 'info-circle';
             if (type === 'success') icon = 'check-circle';
             if (type === 'error') icon = 'exclamation-triangle';

             toast.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
             document.body.appendChild(toast);

             setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Modal Logic
        function openModal() {
            document.getElementById('photo-modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scroll
        }

        function closeModal() {
            document.getElementById('photo-modal').classList.remove('active');
            document.body.style.overflow = ''; // Restore scroll
        }

        // Close modal when clicking overlay
        document.getElementById('photo-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Form submission handling
        document.getElementById('add-photo-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Foto berhasil diunggah (Simulasi)');
            closeModal();
            this.reset();
        });

        function navigate() {
            const hash = window.location.hash.substring(1) || 'dashboard';
            const appView = document.getElementById('app-view');
            
            // Injeksi konten view
            if (views[hash]) {
                appView.innerHTML = views[hash];
            } else {
                appView.innerHTML = '<h2>Halaman tidak ditemukan.</h2>';
            }

            // Update state menu aktif
            document.querySelectorAll('.nav-link-spa, .bottom-link').forEach(link => {
                if (link.getAttribute('data-view') === hash) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });

            // Scroll ke atas saat pindah halaman
            window.scrollTo(0, 0);
        }

        // Listen hash change
        window.addEventListener('hashchange', navigate);
        
        // Initial load
        window.addEventListener('load', navigate);
    </script>
</body>
</html>
